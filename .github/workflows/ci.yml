name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # FedericoCarboni/setup-ffmpeg@v3 rejects macOS arm64 (macos-latest).
      - name: Install FFmpeg
        uses: AnimMouse/setup-ffmpeg@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libx11-dev \
            libxfixes-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: uppercut-app/package-lock.json

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: uppercut-app

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --verbose

      - name: Test
        run: cargo test --workspace --verbose
        env:
          # Prefer Vulkan/GL/DX12; soft adapters help headless Linux runners.
          WGPU_BACKEND: vulkan,dx12,metal,gl

      - name: Validate registry index
        shell: bash
        run: |
          python3 - <<'PY'
          import json, os, sys
          from pathlib import Path
          root = Path("examples/registry")
          index = root / "index.json"
          data = json.loads(index.read_text(encoding="utf-8"))
          assert isinstance(data, list), "index.json must be a list"
          required = {"id", "kind", "summary", "schema_version"}
          for i, entry in enumerate(data):
              missing = required - set(entry)
              assert not missing, f"entry {i} missing {missing}"
              assert entry["kind"] in ("pack", "plugin"), entry
              path = entry.get("path")
              if path:
                  resolved = (root / path).resolve()
                  assert resolved.exists(), f"missing path for {entry['id']}: {resolved}"
                  if entry["kind"] == "pack":
                      assert (resolved / "pack.json").is_file(), resolved
                  else:
                      assert (resolved / "plugin.json").is_file(), resolved
          print(f"ok: {len(data)} registry entries")
          PY
