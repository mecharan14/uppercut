name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# PLAN.md Phase 0: Windows-first CI. macOS/Linux runners are added in Phase 3
# (docs/architecture.md, PLAN.md §4) once uppercut-app and native media deps are wired up
# cross-platform — don't add them ahead of that without a reason.
jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --verbose

      - name: Test
        run: cargo test --workspace --verbose
